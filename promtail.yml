clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: my-dotnet-api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: my-dotnet-api
          __path__: /tmp/log/my-dotnet-api/*.log

  - job_name: my-nest-api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: my-nest-api
          __path__: /tmp/log/my-nest-api/*.log